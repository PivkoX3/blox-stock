<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flare Live Stock</title>
    <style>
        body { background: #2b2d31; color: #dbdee1; font-family: sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .discord-embed { background: #232428; border-left: 4px solid #f0b232; border-radius: 4px; padding: 12px 16px; width: 100%; max-width: 340px; }
        .bot-name { font-weight: bold; color: white; margin-bottom: 8px; font-size: 0.9rem; display: flex; align-items: center; }
        .bot-name::after { content: "✔ BOT"; background: #5865f2; color: white; font-size: 0.6rem; padding: 2px 4px; border-radius: 3px; margin-left: 8px; }
        .title { color: white; font-weight: bold; font-size: 1rem; margin-bottom: 12px; }
        .section-title { font-weight: bold; color: white; font-size: 0.85rem; margin-top: 15px; text-transform: uppercase; }
        .fruit-row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 0.9rem; border-bottom: 1px solid #2e2f35; padding-bottom: 2px; }
        .price { color: #3ba55c; font-weight: bold; }
        .loader { color: #949ba4; font-size: 0.8rem; text-align: center; padding: 20px; }
        .footer { color: #949ba4; font-size: 0.7rem; margin-top: 15px; }
    </style>
</head>
<body>

<div class="discord-embed">
    <div class="bot-name">Flare</div>
    <div class="title">Flare • Live Stock Bot</div>

    <div class="section-title">NORMAL STOCK</div>
    <div id="normal-stock"><div class="loader">Scanning stock...</div></div>

    <div class="section-title">MIRAGE STOCK</div>
    <div id="mirage-stock"><div class="loader">Scanning mirage...</div></div>

    <div class="footer" id="time-footer">Checking reset time...</div>
</div>

<script>
    async function updateStock() {
        const proxy = "https://corsproxy.io/?";
        const url = "https://fruityblox.com/stock";
        
        try {
            const response = await fetch(proxy + encodeURIComponent(url));
            const html = await response.text();
            const doc = new DOMParser().parseFromString(html, "text/html");
            
            // Ищем все карточки фруктов
            const items = doc.querySelectorAll('.stock-item, [class*="StockItem"]');
            let normalHTML = "";
            let mirageHTML = "";

            items.forEach(item => {
                const name = item.querySelector('h3, .name, [class*="Name"]')?.innerText.trim() || "Fruit";
                const price = item.querySelector('.price, [class*="Price"]')?.innerText.trim() || "Stock";
                
                const row = `<div class="fruit-row"><span>🍎 ${name}</span><span class="price">${price}</span></div>`;
                
                // Простая логика: дорогие фрукты или специальные пометки кидаем в Mirage
                if(price.includes('Robux') || price.length > 8) {
                    mirageHTML += row;
                } else {
                    normalHTML += row;
                }
            });

            document.getElementById('normal-stock').innerHTML = normalHTML || "No data";
            document.getElementById('mirage-stock').innerHTML = mirageHTML || "No data";
            document.getElementById('time-footer').innerText = "Expires in every few hours.";

        } catch (e) {
            document.getElementById('normal-stock').innerHTML = "Error loading data.";
        }
    }
    updateStock();
</script>
</body>
</html>
