<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blox Fruits Stock</title>
    <style>
        body { 
            background: #0f172a; color: white; font-family: sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; 
        }
        .header { 
            background: #1e293b; width: 100%; text-align: center; 
            padding: 15px 0; border-bottom: 2px solid #38bdf8; font-weight: bold;
        }
        .stock-image { 
            width: 95%; max-width: 400px; margin-top: 20px; 
            border-radius: 10px; box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }
        .footer-text { font-size: 0.8rem; color: #94a3b8; margin-top: 15px; text-align: center; padding: 0 10px; }
        .btn {
            margin-top: 20px; background: #38bdf8; color: #0f172a; 
            border: none; padding: 10px 25px; border-radius: 20px; 
            font-weight: bold; cursor: pointer; text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="header">🍎 ТЕКУЩИЙ СТОК (ОФИЦИАЛЬНО)</div>

    <img src="https://fruityblox.com/assets/images/stock/stock.png" alt="Загрузка стока..." class="stock-image">

    <p class="footer-text">Изображение обновляется автоматически каждые 4 часа вместе с игрой.</p>

    <a href="https://fruityblox.com/stock" target="_blank" class="btn">ОТКРЫТЬ САЙТ 🌐</a>

</body>
</html>
