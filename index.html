<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox Fruit Stock</title>
    <style>
        body { background: #111827; color: white; font-family: sans-serif; text-align: center; padding: 10px; margin: 0; }
        .header { background: #1f2937; padding: 15px; border-bottom: 2px solid #3b82f6; margin-bottom: 15px; }
        .fruit-card { background: #1e293b; border-radius: 12px; padding: 12px; margin: 8px auto; max-width: 90%; border-left: 5px solid #3b82f6; display: flex; justify-content: space-between; align-items: center; }
        .name { font-weight: bold; font-size: 1.1em; color: #60a5fa; }
        .price { color: #10b981; font-family: monospace; }
        .loader { margin-top: 50px; color: #94a3b8; }
        .refresh-note { font-size: 0.8em; color: #64748b; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <strong>🍎 ТЕКУЩИЙ СТОК</strong>
    </div>
    
    <div id="stock-container">
        <p class="loader">Убираю рекламу и загружаю фрукты...</p>
    </div>

    <p class="refresh-note">Обновляется автоматически каждые 4 часа</p>

    <script>
        async function getStock() {
            const proxy = "https://corsproxy.io/?";
            const target = "https://fruityblox.com/stock";
            try {
                const response = await fetch(proxy + encodeURIComponent(target));
                const text = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, "text/html");

                // Ищем все элементы с фруктами
                const items = doc.querySelectorAll('.stock-item');
                let html = "";

                if (items.length > 0) {
                    items.forEach(item => {
                        const name = item.querySelector('.name')?.innerText || "Фрукт";
                        const price = item.querySelector('.price')?.innerText || "---";
                        html += `<div class="fruit-card"><span class="name">${name}</span><span class="price">${price}</span></div>`;
                    });
                } else {
                    html = "<p>Сток пуст или сайт изменил защиту. <br><br> <a href='https://fruityblox.com/stock' style='color:#3b82f6'>Оригинал</a></p>";
                }
                document.getElementById('stock-container').innerHTML = html;
            } catch (e) {
                document.getElementById('stock-container').innerHTML = "Ошибка загрузки данных.";
            }
        }
        getStock();
    </script>
</body>
</html>
