<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blox Fruits Stock</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --price: #4caf50; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 1.2rem; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; }
        #stock-list { width: 100%; max-width: 350px; }
        .fruit-card { 
            background: var(--card); border: 1px solid #334155; border-radius: 12px; 
            padding: 12px 16px; margin-bottom: 8px; display: flex; 
            justify-content: space-between; align-items: center;
        }
        .name { font-weight: bold; }
        .price { color: var(--price); font-family: monospace; }
        .loader { text-align: center; margin-top: 50px; color: #94a3b8; }
        .btn { margin-top: 20px; background: var(--accent); color: var(--bg); border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h1>🍎 ТЕКУЩИЙ СТОК</h1>
    <div id="stock-list"><div class="loader">Загрузка данных...</div></div>
    <button class="btn" onclick="loadStock()">ОБНОВИТЬ 🔄</button>

    <script>
        async function loadStock() {
            const list = document.getElementById('stock-list');
            list.innerHTML = '<div class="loader">Считываю фрукты...</div>';
            const proxy = "https://corsproxy.io/?";
            const url = "https://fruityblox.com/stock";
            
            try {
                const response = await fetch(proxy + encodeURIComponent(url));
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, "text/html");

                // Ищем любые элементы, похожие на карточки фруктов
                const items = doc.querySelectorAll('.stock-item, [class*="StockItem"], [class*="FruitItem"]');
                let content = "";

                if (items.length > 0) {
                    items.forEach(item => {
                        const name = item.querySelector('h3, .name, [class*="Name"]')?.innerText.trim() || "Фрукт";
                        const price = item.querySelector('.price, [class*="Price"]')?.innerText.trim() || "В наличии";
                        content += `<div class="fruit-card"><span class="name">${name}</span><span class="price">${price}</span></div>`;
                    });
                    list.innerHTML = content;
                } else {
                    list.innerHTML = '<p style="font-size:0.8rem; color:#ef4444">Сайт изменил структуру. Попробуйте обновить позже или <a href="https://fruityblox.com/stock" style="color:var(--accent)">откройте оригинал</a></p>';
                }
            } catch (e) {
                list.innerHTML = '<p>Ошибка сети</p>';
            }
        }
        loadStock();
    </script>
</body>
</html>
